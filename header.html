<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* --- GlobalMedia Elite Deep Purple Master Header Layout --- */
    :root {
        --bg-deep-purple: #090514;      
        --accent-lavender: #9d4edf;     
        --accent-gold: #d4af37;         
        --text-white: #ffffff;
        --text-muted: #b3a9c9;
    }

    .gm-premium-header {
        width: 100%;
        background: var(--bg-deep-purple);
        border-bottom: 1px solid rgba(157, 78, 223, 0.2); 
        position: sticky;
        top: 0;
        z-index: 9999;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .gm-header-container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    /* Brand Identity Block */
    .gm-brand-block {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
    }

    .gm-avatar-wrapper {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--accent-lavender);
        box-shadow: 0 0 10px rgba(157, 78, 223, 0.3);
        overflow: hidden;
    }

    .gm-avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .gm-brand-name {
        color: var(--text-white);
        font-weight: 700;
        font-size: 1.15rem;
        letter-spacing: -0.3px;
    }

    /* Public Navigation Menu Layout */
    .gm-public-nav {
        display: flex;
        align-items: center;
        gap: 24px;
    }

    .gm-nav-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.2s ease;
    }

    .gm-nav-link:hover {
        color: var(--accent-lavender);
    }

    .gm-highlight-link {
        color: #e2d4f0;
        background: rgba(157, 78, 223, 0.15);
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(157, 78, 223, 0.3);
    }

    /* Authenticated App Ecosystem (Icons) */
    .gm-auth-ecosystem {
        display: flex;
        align-items: center;
        gap: 18px;
        background: rgba(255, 255, 255, 0.03);
        padding: 6px 16px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative; 
        display: none; /* Hidden by default until login detected */
    }

    .gm-icon-link {
        color: var(--text-muted);
        font-size: 1.15rem;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .gm-icon-link:hover {
        color: var(--accent-lavender);
    }

    .gm-icon-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.15rem;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
    }

    /* DROPDOWN PANEL */
    .gm-member-dropdown {
        position: absolute;
        top: 45px;
        right: 0;
        width: 290px;
        background: #0f0a24; 
        border: 1px solid rgba(157, 78, 223, 0.3);
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        padding: 12px;
        display: none; 
        z-index: 10000;
    }

    .gm-member-dropdown.active-drop {
        display: block;
    }

    .dropdown-header {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent-gold);
        font-weight: 700;
        padding-bottom: 8px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dropdown-grid {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .drop-item {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        padding: 8px 12px;
        border-radius: 4px;
    }

    .drop-item:hover {
        background: rgba(157, 78, 223, 0.15);
        color: var(--text-white);
    }

    /* --- Sign In & CTA Action styling --- */
    .gm-header-action-zone {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .gm-btn-outline {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid rgba(157, 78, 223, 0.4);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 9px 18px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
        display: none; /* Controlled via Firebase JS */
    }

    .gm-btn-outline:hover {
        color: var(--text-white);
        background: rgba(157, 78, 223, 0.15);
        border-color: var(--accent-purple);
    }

    .gm-btn-gold {
        background: var(--accent-gold);
        color: #000000;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 10px 22px;
        border-radius: 6px;
        transition: all 0.2s ease;
    }

    @media (max-width: 900px) {
        .gm-public-nav { display: none; }
    }
    .gmSignInBtn {background:#afd432;color:black; height:50px;width:50%; border-radius:12px; font-weight:bold; align-items:center; border-bottom-style:solid;border-bottom:3px solid white;}
</style>

<header class="gm-premium-header">
    <div class="gm-header-container">
        
        <a href="index.html" class="gm-brand-block">
            <div class="gm-avatar-wrapper">
                <img src="https://i.postimg.cc/qq6fQynF/unnamed-(2)-(7)-(1).jpg" alt="Miracle Emmanuel" class="gm-avatar-img">
            </div>
            <span class="gm-brand-name">Miracle Emmanuel</span>
        </a>

        <nav class="gm-public-nav">
            <a href="about.html" class="gm-nav-link">About</a>
            <a href="web.html" class="gm-nav-link gm-highlight-link"><i class="fa-solid fa-graduation-cap"></i> Learn Web Dev ($10)</a>
            <a href="https://wa.me/2347044382288" target="_blank" class="gm-nav-link"><i class="fa-brands fa-whatsapp"></i> Contact</a>
        </nav>

        <div id="gmAuthEcosystem" class="gm-auth-ecosystem">
            <a href="index.html" class="gm-icon-link"><i class="fa-solid fa-house"></i></a>
            <a href="messages.html" class="gm-icon-link"><i class="fa-solid fa-comment-dots"></i></a>
            <a href="notifications.html" class="gm-icon-link"><i class="fa-solid fa-bell"></i></a>
            <button id="gmMenuTrigger" class="gm-icon-btn"><i class="fa-solid fa-bars"></i></button>
            
            <div id="gmDropdownDashboard" class="gm-member-dropdown">
                <div class="dropdown-header">Member Ecosystem</div>
                <div class="dropdown-grid">
                    <a href="acc.html" class="drop-item"><i class="fa-solid fa-user-shield"></i> My Account</a>
                    <a href="chatroom.html" class="drop-item"><i class="fa-solid fa-comments"></i> Dev Chatroom</a>
                    <a href="videos.html" class="drop-item"><i class="fa-solid fa-circle-play"></i> Watch Videos</a>
                    <a href="monetization.html" class="drop-item"><i class="fa-solid fa-wallet"></i> Web Monetization</a>
                    <button id="headerLogoutBtn" class="drop-item" style="background:none; border:none; width:100%; text-align:left; cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i> Log Out</button>
                </div>
            </div>
        </div>

        <div class="gm-header-action-zone">
            <a href="login.html" id="gmSignInBtn" class="gm-btn-outline"><i class="fa-solid fa-right-to-bracket"></i> Sign In</a>
            <a href="https://global-media-development.netlify.app/order.html" class="gm-btn-gold">Order Website</a>
        </div>

    </div>
</header>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAreno2SUZ6QK0LP8rlFUIFF-CAJzvCGv0",
        authDomain: "miracle-academy-2c4f3.firebaseapp.com",
        projectId: "miracle-academy-2c4f3",
        storageBucket: "miracle-academy-2c4f3.firebasestorage.app",
        messagingSenderId: "222133626495",
        appId: "1:222133626495:web:d4d8ba60d823e719ae414a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const authEcosystem = document.getElementById("gmAuthEcosystem");
    const signInBtn = document.getElementById("gmSignInBtn");
    const menuTrigger = document.getElementById("gmMenuTrigger");
    const dropdownDashboard = document.getElementById("gmDropdownDashboard");
    const logoutBtn = document.getElementById("headerLogoutBtn");

    // 🔒 Real-time Firebase Authentication listener
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // User is signed in -> Hide Sign In, show dashboard shortcuts
            if (authEcosystem) authEcosystem.style.display = "flex";
            if (signInBtn) signInBtn.style.display = "none";
        } else {
            // User is signed out -> Show Sign In button explicitly, hide premium center
            if (authEcosystem) authEcosystem.style.display = "none";
            if (signInBtn) signInBtn.style.display = "flex";
        }
    });

    // Toggle menu
    if (menuTrigger) {
        menuTrigger.addEventListener("click", (e) => {
            e.stopPropagation();
            if (dropdownDashboard) dropdownDashboard.classList.toggle("active-drop");
        });
    }

    document.addEventListener("click", () => {
        if (dropdownDashboard) dropdownDashboard.classList.remove("active-drop");
    });

    // Safe Log out control
    if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });
    }
    </script>
