<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalMedia - Access Portal</title>
    <style>
        :root {
            --purple: #4A148C;
            --lavender: #E1BEE7;
            --gold: #D4AF37;
            --dark: #121212;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: #fff;
        
            justify-content: center;
            align-items: center;
            
        }
        .auth-container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(74, 20, 140, 0.3);
            border: 1px solid var(--purple);
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: var(--gold);
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--lavender);
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #2b2b2b;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        .input-group input:focus {
            border-color: var(--gold);
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--purple);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--gold);
        }
        .btn:hover {
            background: #6a1b9a;
            transform: translateY(-2px);
        }
        .switch-mode {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
        .switch-mode span {
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="main-header"></div>

    <script src="header-loader.js"></script>
    
<div class="auth-container">
    <h2 id="form-title">Login to GM Pay & Gain full Access to Unlocking Premium!</h2>
    <form id="auth-form">
        <div class="input-group" id="name-group" style="display: none;">
            <label for="fullName">Full Name (As it appears on Bank Account)</label>
            <input type="text" id="fullName" placeholder="Miracle Emmanuel">
        </div>
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" id="submit-btn">Login</button>
    </form>
    <div class="switch-mode">
        <p id="toggle-text">Don't have an account? <span onclick="toggleAuthMode()">Sign Up</span></p>
    </div>
</div>

<script>
    // YOUR LIVE RENDER SERVER URL
    const backendUrl = "https://gmpay.onrender.com"; 
    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        const formTitle = document.getElementById('form-title');
        const nameGroup = document.getElementById('name-group');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');

        if (isLoginMode) {
            formTitle.innerText = "Login to GM Pay";
            nameGroup.style.display = "none";
            submitBtn.innerText = "Login";
            toggleText.innerHTML = `Don't have an account? <span onclick="toggleAuthMode()">Sign Up</span>`;
        } else {
            formTitle.innerText = "Create GM Pay Account";
            nameGroup.style.display = "block";
            submitBtn.innerText = "Register Account";
            toggleText.innerHTML = `Already have an account? <span onclick="toggleAuthMode()">Login</span>`;
        }
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;

        const endpoint = isLoginMode ? '/api/login' : '/api/register';
        const payload = isLoginMode ? { email, password } : { email, password, fullName };

        try {
            const response = await fetch(`${backendUrl}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                // Save user payload token session data
                localStorage.setItem('gm_user_email', data.email);
                localStorage.setItem('gm_user_uid', data.uid);
                
                alert(isLoginMode ? "Login Successful!" : "Registration Successful! Virtual Bank Account Generated.");
                window.location.href = "success.html";
            } else {
                alert("Error: " + data.message);
            }
        } catch (err) {
            console.error(err);
            alert("Could not connect to live backend server. Verify Render configuration.");
        }
    });
</script>
</body>
    </html>
