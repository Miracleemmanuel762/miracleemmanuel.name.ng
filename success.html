<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Successful</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .success-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #e6f7ed;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            color: #10b981;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .redirect-text {
            font-size: 13px;
            color: #9ca3af;
        }

        .redirect-link {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
        }

        .redirect-link:hover {
            text-decoration: underline;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>
        
        <h1>Sign In Successful</h1>
        <p>Welcome back! You have successfully authenticated into your account.</p>
        
        <p class="redirect-text">
            Redirecting to your dashboard in <span id="countdown">5</span> seconds...
        </p>
        
        <div class="spinner"></div>
        
        <p class="redirect-text" style="margin-top: 24px;">
            Not redirecting? <a href="dashboard.html" class="redirect-link">Click here</a>
        </p>
    </div>

    <script>
        // Configuration
        const redirectUrl = "dashboard.html";
        let timeLeft = 5; 
        
        const countdownElement = document.getElementById("countdown");

        // Countdown Timer Logic
        const downloadTimer = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(downloadTimer);
                window.location.href = redirectUrl;
            } else {
                countdownElement.textContent = timeLeft;
            }
        }, 1000);
    </script>
</body>
                               </html>
